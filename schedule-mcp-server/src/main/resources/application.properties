# Run on port 8082 (weather-mcp-server uses 8081)
quarkus.http.port=8082
quarkus.http.cors.enabled=true

# Enforce authentication for MCP SSE
quarkus.http.auth.permission.mcp-endpoints.paths=/mcp/*
quarkus.http.auth.permission.mcp-endpoints.policy=authenticated

# Enable MCP logging
quarkus.mcp.server.traffic-logging.enabled=true
quarkus.mcp.server.traffic-logging.text-limit=1000

# PostgreSQL via Quarkus DevServices (zero-config, spins up a container automatically)
quarkus.datasource.db-kind=postgresql

# Hibernate ORM - drop and recreate schema on startup, load import.sql
quarkus.hibernate-orm.database.generation=drop-and-create
